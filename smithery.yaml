# Smithery configuration file: https://smithery.ai/docs/deployments

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - geminiApiKey
      - perplexityApiKey
    properties:
      geminiApiKey:
        type: string
        description: The API key for Google's Gemini AI service.
      perplexityApiKey:
        type: string
        description: The API key for the Perplexity AI service.
      stackExchangeKey:
        type: string
        default: null
        description: The API key for Stack Exchange (optional).
  commandFunction:
    # A function that produces the CLI command to start the MCP on stdio.
    |-
    (config) => ({ command: 'node', args: ['build/index.js'], env: { GEMINI_API_KEY: config.geminiApiKey, PERPLEXITY_API_KEY: config.perplexityApiKey, STACK_EXCHANGE_KEY: config.stackExchangeKey } })